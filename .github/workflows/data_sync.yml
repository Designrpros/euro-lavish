name: Monthly Cost of Living Data Sync

on:
  schedule:
    # Run at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Data Sync Engine
        run: python3 scripts/sync_prices.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "CostOfLiving-Bot"
          git config --global user.email "bot@costofliving.no"
          git add docs/
          if git diff-index --quiet HEAD; then
            echo "No price changes found to commit."
          else
            git commit -m "Auto-Update: Monthly Cost of Living Data Sync (Numbeo)"
            git push
          fi
