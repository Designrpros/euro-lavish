site_name: 🪙 Euro Lavish
site_description: Cost of Living in Europe - 26 Countries, Multiple Cities
site_author: Alcatelz
site_url: https://designrpros.github.io/euro-lavish/

theme:
  name: material
  palette:
    primary: teal
    accent: cyan
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - navigation.instant
    - navigation.expand

plugins:
  - search:
      separator: '[\s\-\.]+'

nav:
  - 🏠 Home: index.md
  - 🏔️ Nord-Europa:
    - norway/overview.md
    - sweden/overview.md
    - denmark/overview.md
    - estonia/overview.md
    - iceland/overview.md
    - finnland/overview.md
  - 🏗️ Øst-Europa:
    - poland/overview.md
    - czech/overview.md
    - hungary/overview.md
    - romania/overview.md
    - serbia/overview.md
    - bulgaria/overview.md
  - ☀️ Sør-Europa:
    - spain/overview.md
    - portugal/overview.md
    - italy/overview.md
    - greece/overview.md
    - croatia/overview.md
    - malta/overview.md
  - 🔵 Sentral-Europa:
    - germany/overview.md
    - austria/overview.md
    - switzerland/overview.md
  - 🌊 Vest-Europa:
    - uk/overview.md
    - ireland/overview.md
    - netherlands/overview.md
    - belgium/overview.md
    - france/overview.md
  - 💰 Affiliate: affiliate.md
  - 🛠️ Praktisk: praktisk/index.md
  - 🌍 Lenker: europe-links.md
