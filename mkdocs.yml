site_name: Cost of Living
site_description: Cost of living in 26 European countries and 159+ cities
site_author: Alcatelz
site_url: https://costofliving.no/

theme:
  name: material
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  palette:
    primary: teal
    accent: cyan
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - navigation.instant
    - navigation.expand

extra_javascript:
  - assets/javascripts/analytics.js

plugins:
  - search:
      separator: '[\s\-\.]+'
      prebuild_index: true

nav:
  - 🏔️ Northern Europe:
    - norway/index.md
    - sweden/index.md
